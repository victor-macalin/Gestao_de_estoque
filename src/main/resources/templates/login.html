<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Gestão de Estoque</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<div id="toast"></div>

<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">⚡</div>
      <h1>Gestão de Estoque</h1>
      <p>Faça login para continuar</p>
    </div>

    <form id="formLogin">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" type="email" class="form-control" placeholder="seu@email.com" required/>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" type="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:15px;margin-top:8px;">
        Entrar
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--cinza);">
      Não tem conta?
      <a href="#" onclick="toast('Entre em contato com o administrador','err');return false;"
         style="color:var(--azul-claro);font-weight:600;">Fale com o admin</a>
    </p>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script>initLogin();</script>
</body>
</html>
